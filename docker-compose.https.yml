# Optional HTTPS with Caddy. Requires domain DNS pointing to this server.
# Usage: docker compose -f docker-compose.prod.yml -f docker-compose.https.yml up -d

services:
  app:
    ports: !reset []

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    environment:
      MALU_DOMAIN: "${MALU_DOMAIN:-localhost}"
      MALU_UPSTREAM: app:8000
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
