services:
  app:
    image: malu:latest
    build:
      context: .
      target: production
    ports:
      - "${APP_PORT:-8000}:8000"
    env_file:
      - path: .env
        required: false
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      REDIS_HOST: redis
      QUEUE_CONNECTION: redis
    volumes:
      - storage:/var/www/html/storage/app/private
      - database:/var/www/html/database
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  queue:
    image: malu:latest
    env_file:
      - path: .env
        required: false
    environment:
      REDIS_HOST: redis
      QUEUE_CONNECTION: redis
    volumes:
      - storage:/var/www/html/storage/app/private
      - database:/var/www/html/database
    depends_on:
      redis:
        condition: service_healthy
    command:
      [
        "php",
        "artisan",
        "queue:work",
        "--tries=1",
        "--timeout=630",
      ]
    restart: unless-stopped

  scheduler:
    image: malu:latest
    env_file:
      - path: .env
        required: false
    environment:
      REDIS_HOST: redis
    volumes:
      - database:/var/www/html/database
    depends_on:
      redis:
        condition: service_healthy
    command: ["php", "artisan", "schedule:work"]
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  storage:
  database:
